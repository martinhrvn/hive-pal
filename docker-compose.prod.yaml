services:
  backend:
    image: 'ghcr.io/martinhrvn/hive-pal:latest'
    ports:
      - '80:3000'
    environment:
      NODE_ENV: production
      ADMIN_EMAIL: '${ADMIN_EMAIL:-admin@example.com}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-password}'
      DATABASE_URL: '${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/beekeeper}'
      SENTRY_DSN: '${SENTRY_DNS}'
      SENTRY_ENVIRONMENT: '${SENTRY_ENVIRONMENT}'
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      FROM_EMAIL: noreply@hivepal.app
      FRONTEND_URL: ${FRONTEND_URL:-https://hivepal.app}
    depends_on:
      - postgres
    healthcheck:
      test:
        - CMD
        - wget
        - 'http://localhost:3000/api/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: 'postgres:14'
    container_name: hive-pal-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beekeeper
    volumes:
      - '/data/hive-pal-data/postgres:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U postgres -d beekeeper'
      interval: 10s
      timeout: 5s
      retries: 5
